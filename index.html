<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>TicTacToe</title>
</head>
<body>
    <div id="title-container">
        <div>Tic-Tac-Toe!</div>
        <div>By Ryan Nave</div>
        <div id="player-container">
            <form id="playerForm">
                <input type="text" id="playerOneName" placeholder="Player 1" required>
                <input type="text" id="playerTwoName" placeholder="Player 2" required>
                <button type="submit">Start</button>
            </form>
        </div>
        <div id="names-container">
            <div id="playerOneShow" class="playerName"></div>
            <div>VS</div>
            <div id="playerTwoShow" class="playerName"></div>
        </div>
    </div>

    <div id="grid-container" class="grid-container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div id="winner-container">
        <div id="winner"></div>
        <div>wins!</div>
        <button id="reset" type="submit" onclick="location.reload()">Play again</button>
    </div>
</body>
</html>
